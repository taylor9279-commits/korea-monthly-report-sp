<style>
  :root {
    --plane: #f7f8f6; --surface: #fcfcfb; --ink: #0b0b0b; --ink-2: #52514e;
    --muted: #898781; --border: rgba(11,11,11,0.12); --accent: #0f5c49;
    --err: #c22f2f;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --plane: #0d0d0d; --surface: #1a1a19; --ink: #f4f4f0; --ink-2: #c3c2b7;

      --err: #e66767;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: grid; place-items: center;
         background: var(--plane); color: var(--ink); padding: 24px;
         font-family: Pretendard, -apple-system, "Segoe UI", system-ui, sans-serif;
         font-size: 15px; line-height: 1.55; -webkit-font-smoothing: antialiased; }
  .gate { width: 100%; max-width: 380px; background: var(--surface);
          border: 1px solid var(--border); border-radius: 10px; padding: 30px 28px; }
  .issuer { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
            color: var(--accent); font-weight: 700; }
  h1 { font-size: 20px; font-weight: 750; letter-spacing: -0.01em; margin: 10px 0 2px; }
  .period { font-size: 14px; color: var(--ink-2); margin-bottom: 22px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--ink-2);
          margin-bottom: 6px; }
  input { width: 100%; padding: 11px 13px; font-size: 15px; font-family: inherit;
          color: var(--ink); background: var(--plane);
          border: 1px solid var(--border); border-radius: 7px; }
  input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  button { width: 100%; margin-top: 12px; padding: 11px; font-size: 15px;
           font-family: inherit; font-weight: 650; color: #fff; background: var(--accent);
           border: 0; border-radius: 7px; cursor: pointer; }
  button:disabled { opacity: 0.6; cursor: default; }
  .msg { margin-top: 12px; font-size: 13px; min-height: 19px; color: var(--muted); }
  .msg.error { color: var(--err); }
  .foot { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border);
          font-size: 12px; color: var(--muted); }
</style>

  var form = document.getElementById('gate'),
      pw = document.getElementById('pw'),
      go = document.getElementById('go'),
      msg = document.getElementById('msg');

  function bytes(b64) {
    var bin = atob(b64), out = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    if (!pw.value) return;
    if (!window.crypto || !window.crypto.subtle) {
      msg.className = 'msg error';
      msg.textContent = 'This browser cannot decrypt the report. Try Chrome, Edge or Safari.';
      return;
    }
    go.disabled = true;
    msg.className = 'msg';
    msg.textContent = 'Decrypting\u2026';

    crypto.subtle.importKey('raw', new TextEncoder().encode(pw.value),
                            'PBKDF2', false, ['deriveKey'])
      .then(function (base) {
        return crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt: bytes(PAYLOAD.salt),
             iterations: PAYLOAD.iterations, hash: 'SHA-256' },
          base, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
      })
      .then(function (key) {
        return crypto.subtle.decrypt(
          { name: 'AES-GCM', iv: bytes(PAYLOAD.nonce) }, key, bytes(PAYLOAD.data));
      })
      .then(function (plain) {
        var html = new TextDecoder().decode(plain);
        document.open();
        document.write(html);
        document.close();
      })
      .catch(function () {
        go.disabled = false;
        msg.className = 'msg error';
        msg.textContent = 'Wrong password.';
        pw.select();
      });
  });
