<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Shindong Corp.</title>
<style>
  :root { --plane:#f7f8f6; --surface:#fcfcfb; --ink:#0b0b0b; --ink-2:#52514e;
          --border:rgba(11,11,11,0.12); --accent:#0f5c49; }
  @media (prefers-color-scheme: dark) {
    :root { --plane:#0d0d0d; --surface:#1a1a19; --ink:#f4f4f0; --ink-2:#c3c2b7;
            --border:rgba(255,255,255,0.12); --accent:#3fa587; }
  }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; padding:24px;
         background:var(--plane); color:var(--ink);
         font-family:Pretendard,-apple-system,"Segoe UI",system-ui,sans-serif;
         font-size:15px; line-height:1.55; }
  .card { max-width:420px; background:var(--surface); border:1px solid var(--border);
          border-radius:10px; padding:30px 28px; }
  .issuer { font-size:11px; letter-spacing:.14em; text-transform:uppercase;
            color:var(--accent); font-weight:700; }
  h1 { font-size:20px; font-weight:750; margin:10px 0 8px; }
  p { color:var(--ink-2); font-size:14px; margin:0; }
</style>
</head>
<body>
  <div class="card">
    <div class="issuer">Shindong Corp.</div>
    <h1>Korea Sales &amp; Stock Report</h1>
    <p>Reports on this site are encrypted and require a password.
       Please use the direct link provided to you by e-mail.</p>
  </div>
</body>
</html>
